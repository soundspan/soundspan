version: acm.rules.v1
rules:
  - id: rule_start_with_context
    summary: Start every task with ACM context.
    content: Run `acm get-context --project soundspan ...` before opening or editing files, then follow the returned hard rules.
    enforcement: hard
    tags: [acm, context, workflow]

  - id: rule_fetch_minimal
    summary: Keep retrieved context tight.
    content: Use `fetch` only for the files, plan artifacts, and memories needed for the active step instead of broad repository retrieval.
    enforcement: hard
    tags: [context, efficiency]

  - id: rule_track_multistep_work
    summary: Track multi-step work in ACM.
    content: Use `acm work` for multi-step, multi-file, or handoff-prone tasks. Include `verify:tests` for executable changes.
    enforcement: hard
    tags: [work, planning]

  - id: rule_workflow_gates_sync
    summary: Keep workflow gates and ACM guidance aligned.
    content: Changes to ACM workflow-gate behavior or repo-local review automation must keep `.acm/acm-workflows.yaml`, the root agent contracts, `.claude/acm-broker/**`, and any impacted maintainer docs or CI files semantically aligned. Update whichever of those surfaces the behavior change actually affects.
    enforcement: hard
    tags: [workflow, docs, claude]

  - id: rule_verify_before_completion
    summary: Verify executable changes before completion.
    content: For code, config, onboarding, schema, or behavior changes, run `acm verify --project soundspan ...` before `report_completion`.
    enforcement: hard
    tags: [verify, testing, completion]

  - id: rule_soundspan_runtime_boundaries
    summary: Preserve soundspan runtime boundaries and shared helpers.
    content: Keep frontend API calls in `frontend/lib/api.ts`, read backend env through `backend/src/config.ts`, use Prisma as the database access layer, and use shared logging helpers instead of ad hoc runtime logging.
    enforcement: hard
    tags: [frontend, backend, prisma, logging]

  - id: rule_docs_and_changelog
    summary: Update docs and changelog with behavior changes.
    content: User-visible or behavior-changing work must update `CHANGELOG.md` and any impacted operator or onboarding docs in the same change.
    enforcement: hard
    tags: [docs, changelog]

  - id: rule_documentation_coverage
    summary: Keep documentation coverage bars intact.
    content: Exported TypeScript symbols, runtime Python modules, and implemented OpenAPI routes should remain fully documented when touched.
    enforcement: hard
    tags: [docs, typescript, python, openapi]

  - id: rule_work_history_via_acm
    summary: Use ACM work list and search for plan history.
    content: For current, deferred, or completed work lookup, use `acm work list/search --project soundspan --scope all` and fetch the returned keys for details.
    enforcement: hard
    tags: [plans, history, acm]

  - id: rule_plan_before_code
    summary: Plan multi-step work before writing implementation code.
    content: |
      For tasks with more than one implementation step, create ACM work
      (via acm work) with explicit steps and acceptance criteria before
      writing any implementation code. Single-file, single-purpose fixes
      are exempt.
    enforcement: hard
    tags: [planning, workflow]

  - id: rule_feature_plan_schema
    summary: Use the repo-local ACM feature plan schema for net-new feature work.
    content: For net-new feature work, create a root ACM plan with `kind=feature`, explicit objective and scope metadata, `spec_outline` / `refined_spec` / `implementation_plan` stage statuses, and top-level `stage:*` tasks that own child tasks through `parent_task_key`. When a feature splits into multiple workstreams, create child plans with `kind=feature_stream` and `parent_plan_key` pointing at the root feature plan. `acm verify` enforces this schema through `scripts/acm-feature-plan-validate.py`.
    enforcement: hard
    tags: [planning, workflow, docs]

  - id: rule_three_failure_escalation
    summary: Stop and reassess after three failed fix attempts.
    content: |
      If three consecutive attempts to fix the same issue fail, stop.
      Document what was tried and why each attempt failed. Reassess the
      root-cause hypothesis before continuing. Ask the user for guidance
      if the root cause is unclear.
    enforcement: hard
    tags: [debugging, workflow]

  - id: rule_xhigh_review
    summary: Run the repo-standard xhigh cross-LLM review for substantial implementation work.
    content: Before final completion on non-trivial implementation work, satisfy the repo review gate with `acm review --run --project soundspan --receipt-id <receipt-id>`. Keep model and reasoning settings in `.acm/acm-workflows.yaml`.
    enforcement: soft
    tags: [review, codex, workflow]
