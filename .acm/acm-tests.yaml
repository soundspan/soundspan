version: acm.tests.v1
defaults:
  cwd: .
  timeout_sec: 900
tests:
  - id: context-smoke
    summary: Ensure ACM can return scoped context for soundspan
    command:
      argv: ["acm", "get-context", "--project", "soundspan", "--task-text", "soundspan ACM smoke test", "--phase", "plan"]
    select:
      always_run: true
    expected:
      exit_code: 0

  - id: acm-health
    summary: Ensure the ACM repo contract and workflow gates remain healthy
    command:
      argv: ["acm", "health", "--project", "soundspan", "--include-details"]
    select:
      phases: ["execute", "review"]
      changed_paths_any:
        [
          "AGENTS.md",
          "CLAUDE.md",
          ".acm/**",
          ".claude/**",
          ".githooks/**",
          ".gitignore",
          ".env.example",
          "CONTRIBUTING.md",
          "docs/README.md",
          "docs/TESTING.md",
          ".github/workflows/pr-checks.yml",
          ".github/workflows/quality-visibility.yml",
          ".github/PULL_REQUEST_TEMPLATE.md",
          "scripts/acm-cross-review.sh"
        ]
    expected:
      exit_code: 0

  - id: acm-cross-review-help
    summary: Ensure the ACM cross-review gate script parses and exposes help
    command:
      argv: ["bash", "scripts/acm-cross-review.sh", "--help"]
    select:
      phases: ["execute", "review"]
      changed_paths_any: ["scripts/acm-cross-review.sh", ".acm/acm-workflows.yaml"]
    expected:
      exit_code: 0

  - id: backend-test-coverage
    summary: Run the backend Jest coverage suite
    command:
      argv: ["npm", "--prefix", "backend", "run", "test:coverage"]
    select:
      phases: ["execute", "review"]
      changed_paths_any: ["backend/**", "packages/media-metadata-contract/**"]
    expected:
      exit_code: 0

  - id: backend-build
    summary: Run the backend TypeScript build checks
    command:
      argv: ["npm", "--prefix", "backend", "run", "build"]
    select:
      phases: ["execute", "review"]
      changed_paths_any: ["backend/**", "packages/media-metadata-contract/**"]
    expected:
      exit_code: 0

  - id: frontend-lint
    summary: Run frontend ESLint checks
    command:
      argv: ["npm", "--prefix", "frontend", "run", "lint"]
    select:
      phases: ["execute", "review"]
      changed_paths_any: ["frontend/**", "packages/media-metadata-contract/**"]
    expected:
      exit_code: 0

  - id: frontend-build
    summary: Run the frontend production build
    command:
      argv: ["npm", "--prefix", "frontend", "run", "build"]
    select:
      phases: ["execute", "review"]
      changed_paths_any: ["frontend/**", "packages/media-metadata-contract/**"]
    expected:
      exit_code: 0

  - id: frontend-targeted-coverage
    summary: Run targeted frontend coverage checks
    command:
      argv: ["npm", "--prefix", "frontend", "run", "test:coverage"]
    select:
      phases: ["execute", "review"]
      changed_paths_any: ["frontend/**", "packages/media-metadata-contract/**"]
    expected:
      exit_code: 0

  - id: helm-chart-render-check
    summary: Lint and render the Helm chart contract
    command:
      argv: ["./scripts/helm-chart-render-check.sh"]
    select:
      phases: ["execute", "review"]
      changed_paths_any:
        ["charts/**", "scripts/helm-chart-render-check.sh", ".github/workflows/helm-chart-release.yml"]
    expected:
      exit_code: 0
