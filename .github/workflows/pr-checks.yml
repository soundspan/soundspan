name: PR Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  acm-health:
    name: ACM Health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'

      - name: Install ACM
        run: |
          go install github.com/bonztm/agent-context-manager/cmd/acm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Bootstrap ACM
        run: acm bootstrap --project soundspan --project-root .

      - name: Sync ACM
        run: acm sync --project soundspan --mode working_tree --insert-new-candidates --project-root .

      - name: Verify ACM Onboarding Surface
        run: |
          acm verify \
            --project soundspan \
            --phase review \
            --file-changed AGENTS.md \
            --file-changed .acm/acm-rules.yaml \
            --file-changed scripts/acm-legacy-plans.mjs

      - name: ACM Health
        run: acm health --project soundspan --include-details

      - name: ACM Context Smoke
        run: acm get-context --project soundspan --task-text "CI ACM smoke check" --phase plan > /tmp/acm-context.json
